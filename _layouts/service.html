<!DOCTYPE html>
<html lang="en">
<head>
    {% include head.html %}
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body>
{% include header.html %}

<section class="relative py-16 flex items-center overflow-hidden"
         style="background-image: url('{{ page.hero_image }}'); background-size: cover; background-position: center;">

    <div class="absolute inset-0 z-10" style="background: linear-gradient(90deg, rgba(0, 26, 77, 0.95) 0%, rgba(0, 51, 153, 0.7) 60%, rgba(0, 51, 153, 0.3) 100%);"></div>

    <div class="relative z-20 max-w-7xl mx-auto w-full px-8">
        <h1 class="text-4xl lg:text-4xl font-black uppercase tracking-widest text-white mb-2">{{ page.hero_title }}</h1>
        <p class="text-sm uppercase tracking-[0.2em] opacity-90 font-medium text-white">{{ page.hero_subtitle }}</p>
    </div>
</section>

<main>
    {% include service-layout.html %}
</main>

{% include footer.html %}
{% include scripts.html %}
</body>
</html>
