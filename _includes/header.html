<!-- Injecting global font styles -->
<style>
    /* Senior-friendly Navigation Styles */
    .senior-nav-link {

        text-transform: uppercase !important;
        /* Restored vertical padding to original generous size */
        padding: 12px 14px !important;
        display: block !important;
        transition: color 0.2s ease !important;
    }

    /* Active Link Styling */
    .senior-nav-link.active-page {
        color: #CC0000 !important;
        font-weight: 900 !important;
    }
</style>

<!-- TOP HEADER BAR -->
<div class="bg-[#1A1A1A] text-white py-3 px-8 text-sm font-medium tracking-wide border-b border-gray-800">
    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
        <!-- Left Side: Socials -->
        <div class="flex items-center gap-5 text-gray-300 order-2 sm:order-1">
            <a href="https://facebook.com" target="_blank" class="hover:text-white transition-colors text-lg"><i class="fab fa-facebook-f"></i></a>
            <a href="https://instagram.com" target="_blank" class="hover:text-white transition-colors text-lg"><i class="fab fa-instagram"></i></a>
            <a href="https://m.me" target="_blank" class="hover:text-white transition-colors text-lg"><i class="fab fa-facebook-messenger"></i></a>
        </div>
        <!-- Right Side: Contact -->
        <div class="flex flex-wrap items-center justify-center sm:justify-end gap-6 text-gray-300 order-1 sm:order-2">
            <a href="tel:+639171085538" class="hover:text-white transition-colors flex items-center gap-2"><i class="fas fa-phone fa-solid text-[#CC0000]"></i> +63 917 108 5538</a>
            <a href="https://viber.click/639171085538" target="_blank" class="hover:text-white transition-colors flex items-center gap-2"><i class="fab fa-viber text-purple-500"></i> Viber Chat</a>
            <a href="mailto:info@philproglobal.com" class="hover:text-white transition-colors flex items-center gap-2"><i class="fas fa-envelope fa-solid text-[#CC0000]"></i> info@philproglobal.com</a>
        </div>
    </div>
</div>

<!-- Main Navigation Bar -->
<nav class="sticky top-0 z-50 bg-[#FDFBF7]/95 backdrop-blur-md border-b border-[#CC0000]/30 shadow-md py-5">
    <div class="max-w-7xl mx-auto px-6 flex flex-col lg:flex-row justify-between items-center gap-6">

        <!-- Logo Identity Block -->
        <div class="flex items-center gap-5">
            <img src="{{ '/philpro_logo.png' | relative_url }}" alt="PhilPro Logo" class="h-12 w-auto">
            <div class="flex flex-col leading-none border-l-2 border-[#CC0000]/40 pl-5">
                <span class="text-2xl font-black tracking-tight text-[#CC0000]">Phil<span class="text-[#003399] uppercase">Pro</span></span>
                <span class="text-xs uppercase tracking-wider text-[#0A1B3A] mt-1 font-bold">Global Accounting & Outsourcing Solutions</span>
            </div>
        </div>

        <!-- Links Container -->
        <div class="flex flex-wrap justify-center items-center gap-x-2 gap-y-3 text-center">
            <a href="{{ '/' | relative_url }}" class="senior-nav-link text-[#003399] hover:text-[#CC0000]">Home</a>
            <a href="{{ '/about' | relative_url }}" class="senior-nav-link text-[#003399] hover:text-[#CC0000]">About Us</a>
            <a href="/services" class="senior-nav-link text-[#003399] hover:text-[#CC0000]">Services</a>
            <a href="/FAQ" class="senior-nav-link text-[#003399] hover:text-[#CC0000]">FAQ</a>

            <!-- Contact CTA Button -->
            <a href="/contact" class="lg:ml-4 bg-[#003399] text-[#FDFBF7] text-xl font-bold uppercase px-8 py-4 rounded-md hover:bg-[#CC0000] transition-colors duration-200 block shadow-md no-underline">
                Contact Us
            </a>
        </div>
    </div>
</nav>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.senior-nav-link');
        navLinks.forEach(link => {
            if (link.getAttribute('href') === currentPath || (currentPath === '/' && link.getAttribute('href').endsWith('/'))) {
                link.classList.add('active-page');
            }
        });
    });
</script>
